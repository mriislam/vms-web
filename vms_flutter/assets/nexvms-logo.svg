<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#15803d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Blue ribbon — left side (N-shape curve) -->
  <path d="M 30 160 C 10 140, 8 80, 30 50 C 50 25, 80 18, 100 20
            C 85 22, 65 30, 55 50 C 40 75, 38 120, 50 145
            C 58 162, 70 170, 80 172
            C 60 170, 40 175, 30 160 Z"
        fill="url(#blueGrad)" opacity="0.95"/>

  <!-- Blue ribbon inner curve -->
  <path d="M 45 55 C 60 35, 85 28, 100 30
            C 88 32, 72 40, 62 58 C 50 80, 48 115, 58 140
            C 48 120, 44 88, 45 55 Z"
        fill="#1e40af" opacity="0.6"/>

  <!-- Blue arrow pointing right-up at top -->
  <path d="M 95 22 L 120 15 L 115 28 C 105 25, 100 23, 95 22 Z"
        fill="#2563eb" opacity="0.9"/>

  <!-- Green ribbon — right side -->
  <path d="M 170 40 C 192 60, 195 120, 172 152 C 155 175, 125 182, 105 180
            C 120 178, 140 168, 150 148 C 165 122, 165 78, 152 54
            C 144 37, 132 28, 120 26
            C 140 28, 162 30, 170 40 Z"
        fill="url(#greenGrad)" opacity="0.95"/>

  <!-- Green checkmark / arrow element -->
  <path d="M 155 50 C 165 65, 170 90, 168 115
            C 166 95, 158 72, 148 58 Z"
        fill="#15803d" opacity="0.5"/>

  <!-- Green inner arrow (upward curved) -->
  <path d="M 130 178 C 148 172, 162 160, 170 145
            C 160 162, 145 172, 130 178 Z"
        fill="#16a34a" opacity="0.7"/>

  <!-- Arrow tip on green ribbon (top-right) -->
  <path d="M 168 42 L 178 25 L 165 30 C 167 34, 168 38, 168 42 Z"
        fill="#22c55e"/>

  <!-- Car body — white/silver -->
  <g filter="url(#shadow)" transform="translate(100,103) scale(1)">
    <!-- Main car body -->
    <ellipse cx="0" cy="8" rx="48" ry="14" fill="#e2e8f0" opacity="0.3"/>
    <!-- Cabin top -->
    <path d="M -22 2 C -18 -16, -6 -22, 0 -22 C 6 -22, 18 -16, 22 2 Z"
          fill="white" opacity="0.95"/>
    <!-- Windshield -->
    <path d="M -18 2 C -14 -12, -4 -18, 0 -18 C 4 -18, 14 -12, 18 2 Z"
          fill="#bfdbfe" opacity="0.7"/>
    <!-- Car body lower -->
    <rect x="-32" y="2" width="64" height="12" rx="4" fill="white" opacity="0.95"/>
    <!-- Hood -->
    <path d="M 22 2 L 38 4 L 38 10 L 22 12 Z" fill="white" opacity="0.9"/>
    <!-- Trunk -->
    <path d="M -22 2 L -38 4 L -38 10 L -22 12 Z" fill="white" opacity="0.9"/>
    <!-- Windows -->
    <rect x="-20" y="3" width="16" height="8" rx="2" fill="#93c5fd" opacity="0.6"/>
    <rect x="-2" y="3" width="16" height="8" rx="2" fill="#93c5fd" opacity="0.6"/>
    <!-- Front wheel -->
    <circle cx="28" cy="14" r="8" fill="#374151"/>
    <circle cx="28" cy="14" r="4" fill="#9ca3af"/>
    <!-- Rear wheel -->
    <circle cx="-28" cy="14" r="8" fill="#374151"/>
    <circle cx="-28" cy="14" r="4" fill="#9ca3af"/>
    <!-- Headlight -->
    <ellipse cx="37" cy="7" rx="3" ry="2" fill="#fef3c7" opacity="0.9"/>
    <!-- Tail light -->
    <ellipse cx="-37" cy="7" rx="3" ry="2" fill="#fca5a5" opacity="0.9"/>
  </g>
</svg>
