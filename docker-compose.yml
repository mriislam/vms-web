version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vms-postgres
    environment:
      POSTGRES_DB: vmsdb
      POSTGRES_USER: vms
      POSTGRES_PASSWORD: vms_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vms -d vmsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: vms-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vmsdb
      SPRING_DATASOURCE_USERNAME: vms
      SPRING_DATASOURCE_PASSWORD: vms_secret
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: change-me-in-production-use-256-bit-key
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build: ./gateway
    container_name: vms-gateway
    environment:
      PORT: 3000
      BACKEND_URL: http://backend:8080
      JWT_SECRET: change-me-in-production-use-256-bit-key
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    container_name: vms-frontend
    ports:
      - "5173:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
  redis_data:
